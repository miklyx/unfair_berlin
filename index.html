<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unfair Berlin Reviews Map</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="map" aria-label="Map of unfair places">
        <iframe
          id="osm-frame"
          title="OpenStreetMap Berlin"
          src="https://www.openstreetmap.org/export/embed.html?bbox=13.0883%2C52.3383%2C13.7612%2C52.6755&amp;layer=mapnik"
        ></iframe>
        <div id="pin-layer" aria-label="Place pins"></div>
      </section>
      <aside class="details-panel">
        <h1>Unfair Berlin</h1>
        <p class="intro">
          Community map of Berlin places reported for deleting fair negative reviews.
        </p>

        <section class="panel-block">
          <h2>Place details</h2>
          <div id="selected-place" class="selected-place">Select a map pin to see details.</div>
        </section>

        <section class="panel-block">
          <h2>Submit a place</h2>
          <form id="place-form">
            <label>
              Place name
              <input id="name" name="name" required />
            </label>
            <label>
              Address
              <input id="address" name="address" required />
            </label>
            <div class="coords-grid">
              <label>
                Latitude
                <input id="lat" name="lat" type="number" step="0.000001" required />
              </label>
              <label>
                Longitude
                <input id="lng" name="lng" type="number" step="0.000001" required />
              </label>
            </div>
            <label>
              Deleted reviews count
              <input id="deletedCount" name="deletedCount" type="number" min="1" required />
            </label>
            <label>
              Platform
              <select id="platform" name="platform" required>
                <option value="Google Maps">Google Maps</option>
                <option value="Tripadvisor">Tripadvisor</option>
                <option value="Yelp">Yelp</option>
                <option value="Other">Other</option>
              </select>
            </label>
            <label>
              Proof screenshot / letter
              <input id="proof" name="proof" type="file" accept="image/*,.pdf" required />
            </label>
            <label>
              Notes
              <textarea id="notes" name="notes" rows="2"></textarea>
            </label>
            <button type="submit">Submit for moderation</button>
            <p id="form-feedback" class="form-feedback" aria-live="polite"></p>
          </form>
        </section>

        <section class="panel-block">
          <h2>Moderation queue</h2>
          <ul id="moderation-list" class="moderation-list"></ul>
        </section>
      </aside>
    </main>

    <section class="stats-panel">
      <h2>Statistics</h2>
      <div class="stats-grid">
        <div class="stat-card">
          <strong id="total-places">0</strong>
          <span>Approved places</span>
        </div>
        <div class="stat-card">
          <strong id="total-reviews">0</strong>
          <span>Reported deleted reviews</span>
        </div>
        <div class="stat-card">
          <strong id="pending-count">0</strong>
          <span>Pending moderation</span>
        </div>
      </div>
      <ul id="top-places" class="top-places"></ul>
    </section>

    <script src="./app.js"></script>
  </body>
</html>
